spring:
  application:
    name: springboot-init-template
  
  datasource:
    url: jdbc:mysql://127.0.0.1:3307/medpal?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=UTF-8
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  
  jackson:
    serialization:
      write-dates-as-timestamps: false
      indent-output: true
    deserialization:
      fail-on-unknown-properties: false
  
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  
  web:
    resources:
      static-locations: file:${file.storage.path:~/uploads}/

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

server:
  port: 19911
  servlet:
    context-path: /api
  compression:
    enabled: true
    min-response-size: 1024

logging:
  level:
    root: info
    com.jcen.medpal: debug
    org.springframework.web: debug
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/application.log
    max-size: 10MB
    max-history: 10

# 文件存储配置
file:
  minio:
    endpoint: ${MINIO_ENDPOINT:http://127.0.0.1:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket-name: ${MINIO_BUCKET_NAME:foodpal-project}

# JWT 配置
jwt:
  secret: your-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm-jcenLeung
  expiration: 86400000  # 24 小时（毫秒）

# 微信小程序配置
wechat:
  app-id: wx0e2532fe4101edae
  secret: e384a44011b27921017deb44389382a3
  login-url: https://api.weixin.qq.com/sns/jscode2session
  session-key-url: https://api.weixin.qq.com/sns/oauth2/access_token

# 应用配置
app:
  name: springboot-init-template
  version: 1.0.0
  description: Spring Boot + Vue 3 通用模板项目
