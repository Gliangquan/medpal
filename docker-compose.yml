services:
  medpal-backend:
    build:
      context: ./MedPal-backend
    container_name: medpal-backend
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      TZ: Asia/Shanghai
      DATASOURCE_URL: jdbc:mysql://host.docker.internal:3307/medpal?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=UTF-8
      DATASOURCE_USERNAME: root
      DATASOURCE_PASSWORD: root
      MINIO_ENDPOINT: http://host.docker.internal:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET_NAME: medpal-project
      JWT_SECRET: medpal-jwt-secret-please-change-in-production-2026-very-long
      FILE_STORAGE_PATH: /app/uploads
      SPRING_REDIS_HOST: host.docker.internal
      SPRING_REDIS_PORT: 6379
      SPRING_RABBITMQ_HOST: host.docker.internal
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
    ports:
      - "19911:19911"
    volumes:
      - medpal_uploads:/app/uploads
      - medpal_logs:/app/logs

  medpal-frontend:
    build:
      context: ./MedPal-frontend
    container_name: medpal-frontend
    restart: unless-stopped
    depends_on:
      - medpal-backend
    ports:
      - "19912:19912"

  medpal-uniapp-h5:
    build:
      context: ./MedPal-uniapp
      dockerfile: Dockerfile.h5
    container_name: medpal-uniapp-h5
    restart: unless-stopped
    depends_on:
      - medpal-backend
    ports:
      - "19913:19913"

volumes:
  medpal_uploads:
  medpal_logs:
